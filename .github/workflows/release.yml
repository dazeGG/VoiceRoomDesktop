name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Validate tag matches package.json
        run: npm run release:validate -- ${{ steps.version.outputs.tag }}

  build-mac:
    name: Build macOS
    needs: validate
    runs-on: macos-latest
    env:
      VOICE_ROOM_URL: ${{ vars.VOICE_ROOM_URL || 'https://voiceroom.ru' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceRoom-macOS-${{ needs.validate.outputs.version }}
          path: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.blockmap
            dist/**/*.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: validate
    runs-on: windows-latest
    env:
      VOICE_ROOM_URL: ${{ vars.VOICE_ROOM_URL || 'https://voiceroom.ru' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceRoom-Windows-${{ needs.validate.outputs.version }}
          path: |
            dist/**/*.exe
            dist/**/*.blockmap
            dist/**/*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - validate
      - build-mac
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Voice Room ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
