<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; base-uri 'none'; form-action 'none'; connect-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data: blob:; font-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Room Stream Picker Preview</title>
    <link rel="stylesheet" href="../shell-tokens.css">
    <link rel="stylesheet" href="./screen-picker-preview.css">
  </head>
  <body>
    <main class="screen-picker-shell">
      <section class="screen-source-panel" aria-labelledby="pickerTitle">
        <header class="screen-source-heading">
          <h1 id="pickerTitle">Выберите, что показать</h1>
          <button class="screen-source-close" id="screenSourceClose" type="button" aria-label="Закрыть">
            <i data-lucide="x" data-icon-size="md" aria-hidden="true"></i>
          </button>
        </header>

        <nav class="screen-source-tabs" aria-label="Тип источника" role="tablist">
          <button class="screen-source-tab" id="screenSourceScreensTab" type="button" role="tab" aria-controls="screenSourceTabpanel" aria-selected="true">
            <i data-lucide="monitor" data-icon-size="sm" aria-hidden="true"></i>
            Экраны
          </button>
          <button class="screen-source-tab" id="screenSourceWindowsTab" type="button" role="tab" aria-controls="screenSourceTabpanel" aria-selected="false">
            <i data-lucide="app-window" data-icon-size="sm" aria-hidden="true"></i>
            Окна
          </button>
        </nav>

        <div id="screenSourceTabpanel" role="tabpanel" aria-labelledby="screenSourceScreensTab">
          <div class="screen-source-options" id="screenSourceOptions" role="radiogroup" aria-label="Источники"></div>
        </div>

        <footer class="screen-source-footer">
          <!-- Selection summary -->
          <div class="screen-source-summary">
            <span class="screen-source-summary-icon" aria-hidden="true">
              <i data-lucide="monitor" data-icon-size="sm"></i>
            </span>
            <div class="screen-source-summary-text">
              <div class="screen-source-summary-name" id="screenSummaryName">Не выбрано</div>
              <div class="screen-source-summary-detail" id="screenSummaryDetail">SD · 720p · 30 к/с · звук</div>
            </div>
          </div>

          <div class="screen-source-footer-actions">
            <!-- SD / HD toggle -->
            <div class="screen-source-res-toggle" id="screenResToggle" role="group" aria-label="Качество">
              <button type="button" data-quality-preset="sd" aria-pressed="true">SD</button>
              <button type="button" data-quality-preset="hd" aria-pressed="false">HD</button>
            </div>

            <!-- Gear + popover -->
            <div class="screen-source-gear-wrap">
              <button class="screen-source-gear" id="screenSettingsGear" type="button" title="Настройки стрима" aria-pressed="false" aria-controls="screenSettingsPopover">
                <i data-lucide="settings" data-icon-size="md" aria-hidden="true"></i>
              </button>

              <div class="screen-settings-popover" id="screenSettingsPopover" hidden role="dialog" aria-label="Настройки стрима">
                <div class="screen-settings-label">Режим стрима</div>
                <div class="screen-settings-presets">
                  <button class="screen-settings-preset" id="screenModeGames" type="button" data-mode="games" aria-pressed="true">
                    <span class="screen-settings-icon">
                      <i data-lucide="play" data-icon-size="sm" aria-hidden="true"></i>
                    </span>
                    <span class="screen-settings-info">
                      <span class="screen-settings-title">Плавное видео</span>
                      <span class="screen-settings-desc">30 к/с · для игр и видео</span>
                    </span>
                    <span class="screen-settings-radio" aria-hidden="true">
                      <span class="screen-settings-dot"></span>
                    </span>
                  </button>
                  <button class="screen-settings-preset" id="screenModeText" type="button" data-mode="text" aria-pressed="false">
                    <span class="screen-settings-icon">
                      <i data-lucide="type" data-icon-size="sm" aria-hidden="true"></i>
                    </span>
                    <span class="screen-settings-info">
                      <span class="screen-settings-title">Чёткая картинка</span>
                      <span class="screen-settings-desc">5 к/с · для текста и кода</span>
                    </span>
                    <span class="screen-settings-radio" aria-hidden="true"></span>
                  </button>
                </div>

                <div class="screen-settings-sep"></div>

                <label class="screen-audio-toggle">
                  <input id="screenAudioToggle" type="checkbox" checked>
                  <span class="screen-audio-label">Звук стрима</span>
                  <span class="screen-audio-switch" aria-hidden="true"></span>
                </label>
              </div>
            </div>

            <button class="screen-source-launch" id="screenSourceStart" type="button" disabled>
              <i data-lucide="play" data-icon-size="sm" data-icon-fill="true" aria-hidden="true"></i>
              Запустить
            </button>
          </div>
        </footer>
      </section>
    </main>
    <script src="../../node_modules/lucide/dist/umd/lucide.min.js"></script>
    <script src="./screen-picker-icons.js"></script>
    <script src="./screen-picker.js"></script>
  </body>
</html>
