<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Room</title>
    <link rel="stylesheet" href="../shell-tokens.css">
    <link rel="stylesheet" href="./update-splash.css">
  </head>
  <body>
    <main class="update-shell">
      <p class="update-eyebrow">Voice Room</p>
      <h1 id="updateTitle">Запуск</h1>
      <p class="update-message" id="updateMessage">Проверка обновлений...</p>
      <div class="update-progress" id="updateProgress" hidden>
        <div class="update-progress-bar" id="updateProgressBar"></div>
      </div>
      <p class="update-progress-label" id="updateProgressLabel" hidden></p>
      <div class="update-actions">
        <button class="update-proceed" id="updateProceed" type="button" hidden>Войти в приложение</button>
        <button class="update-quit" id="updateQuit" type="button" hidden>Закрыть</button>
      </div>
    </main>
    <script src="./update-splash.js"></script>
  </body>
</html>
